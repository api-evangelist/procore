aid: procore
name: Procore
description: Procore is a leading construction management platform that connects people,
  applications, and devices across a single source of truth. The Procore API enables
  developers to build custom apps and integrations, extract meaningful insights, integrate
  with other industry-leading construction solutions, and use Procore as a primary
  system of record. The platform supports the entire construction lifecycle including
  project management, financials, quality and safety, field productivity, and resource
  management.
