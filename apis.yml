apis:
- aid: procore:procore-api
  name: Procore API
  description: The Procore API provides programmatic access to Procore's construction
    management platform, enabling developers to build custom applications and integrations.
    The API exposes endpoints for projects, companies, users, directory, drawings,
    RFIs, submittals, change events, budgets, and more. Procore also operates an App
    Marketplace for distributing integrations built on the platform.
